<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #05050f;
      --bg2: #0d0d20;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --accent-glow: rgba(167,139,250,0.35);
      --text: #f0f0fa;
      --muted: #6b7280;
      --danger: #f87171;
      --danger-glow: rgba(248,113,113,0.4);
      --success: #34d399;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #1a0a3a 0%, var(--bg1) 60%),
                  radial-gradient(ellipse at 70% 80%, #0a1a3a 0%, transparent 60%);
      background-color: var(--bg1);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      user-select: none;
      overflow: hidden;
    }

    /* ── 背景の光の粒 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(167,139,250,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(96,165,250,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(167,139,250,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(96,165,250,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(167,139,250,0.2) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── 時計リングコンテナ ── */
    .clock-wrap {
      position: relative;
      width: clamp(240px, 45vw, 340px);
      height: clamp(240px, 45vw, 340px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 3;
    }

    .ring-sec {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1);
    }

    .ring-alarm {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .ring-alarm.visible { opacity: 0.5; }

    /* 時計テキスト */
    .clock-inner {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    #clock {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(42px, 9vw, 72px);
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: filter 0.3s;
    }

    #clock.firing {
      animation: clock-pulse 0.5s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 16px var(--accent));
    }

    @keyframes clock-pulse {
      from { filter: drop-shadow(0 0 8px var(--accent)); }
      to   { filter: drop-shadow(0 0 32px var(--accent)); }
    }

    #date-line {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── カード ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 32px;
      width: min(360px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── 時刻インプット ── */
    .time-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #alarm-time {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }

    #alarm-time:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }

    /* ── ボタン ── */
    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 12px 22px;
      transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.94); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 16px rgba(167,139,250,0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 28px rgba(167,139,250,0.5);
      transform: translateY(-1px);
    }

    .btn-primary.active {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      box-shadow: none;
    }

    .btn-primary.active:hover { transform: none; box-shadow: none; }

    .btn-stop {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f87171, #fb923c);
      color: #fff;
      font-size: 15px;
      border-radius: 16px;
      letter-spacing: 0.12em;
      animation: danger-pulse 0.9s ease-in-out infinite alternate;
    }

    @keyframes danger-pulse {
      from { box-shadow: 0 4px 16px var(--danger-glow); }
      to   { box-shadow: 0 4px 40px var(--danger-glow), 0 0 60px rgba(248,113,113,0.2); }
    }

    /* ── ステータスバッジ ── */
    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #status.on .status-dot  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    #status.on              { color: var(--success); }
    #status.firing .status-dot { background: var(--danger); animation: dot-blink 0.4s infinite alternate; }
    #status.firing          { color: var(--danger); }

    @keyframes dot-blink {
      from { opacity: 1; }
      to   { opacity: 0.2; }
    }

    /* ── 発火オーバーレイ ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(30,10,60,0.97) 0%, rgba(5,5,15,0.98) 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    #overlay.show { display: flex; }

    .overlay-ring {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay-ring::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0.3;
      animation: ring-expand 1.2s ease-out infinite;
    }

    .overlay-ring::after {
      content: '';
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0.15;
      animation: ring-expand 1.2s ease-out 0.4s infinite;
    }

    @keyframes ring-expand {
      0%   { transform: scale(0.8); opacity: 0.4; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    #overlay-icon {
      font-size: 80px;
      animation: shake 0.35s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(167,139,250,0.6));
    }

    @keyframes shake {
      0%, 100% { transform: rotate(-10deg) scale(1); }
      50%       { transform: rotate(10deg) scale(1.05); }
    }

    #overlay-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 56px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
    }

    #overlay-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- 時計 + リング -->
  <div class="clock-wrap">
    <svg class="ring-svg" viewBox="0 0 340 340">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#60a5fa"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg"    cx="170" cy="170" r="158"/>
      <circle class="ring-alarm" cx="170" cy="170" r="158" id="ring-alarm"
              stroke-dasharray="992" stroke-dashoffset="992"/>
      <circle class="ring-sec"   cx="170" cy="170" r="158" id="ring-sec"
              stroke-dasharray="992" stroke-dashoffset="992"/>
    </svg>
    <div class="clock-inner">
      <div id="clock">00:00:00</div>
      <div id="date-line">— — —</div>
    </div>
  </div>

  <!-- コントロールカード -->
  <div class="card">
    <span class="card-label">Set Alarm</span>
    <div class="time-row">
      <input id="alarm-time" type="time" value="07:00">
      <button class="btn btn-primary" id="toggle-btn" onclick="toggleAlarm()">Set</button>
    </div>
    <div id="status">
      <span class="status-dot"></span>
      <span id="status-text">No alarm set</span>
    </div>
  </div>

  <!-- 発火オーバーレイ -->
  <div id="overlay">
    <div class="overlay-ring">
      <div id="overlay-icon">⏰</div>
    </div>
    <div id="overlay-time"></div>
    <div id="overlay-label">Wake up!</div>
    <button class="btn btn-stop" onclick="dismiss()">Stop Alarm</button>
  </div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 158;

  let alarmOn = false;
  let alarmTime = '';
  let audioCtx = null;
  let beepInterval = null;
  let firing = false;

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep() {
    const ctx = getAudioCtx();
    const pattern = [880, 1100, 880, 1320];
    let t = ctx.currentTime;
    pattern.forEach(freq => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.start(t);
      osc.stop(t + 0.22);
      t += 0.28;
    });
  }

  function setRingOffset(id, fraction) {
    const el = document.getElementById(id);
    el.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
  }

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');

    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
    document.getElementById('date-line').textContent =
      `${DAYS[now.getDay()]}  ${now.getDate()} ${MONTHS[now.getMonth()]}  ${now.getFullYear()}`;

    // 秒リング
    setRingOffset('ring-sec', now.getSeconds() / 60);

    // アラームリングのマーカー位置
    if (alarmOn && alarmTime) {
      const [ah, am] = alarmTime.split(':').map(Number);
      const alarmFrac = ((ah % 12) * 60 + am) / (12 * 60);
      setRingOffset('ring-alarm', alarmFrac);
    }

    if (alarmOn && !firing) {
      if (`${hh}:${mm}` === alarmTime && ss === '00') fire();
    }
  }

  function fire() {
    firing = true;
    alarmOn = false;
    document.getElementById('clock').classList.add('firing');
    document.getElementById('overlay-time').textContent = alarmTime;
    document.getElementById('overlay').classList.add('show');
    document.getElementById('ring-alarm').classList.remove('visible');
    updateStatus();
    beep();
    beepInterval = setInterval(beep, 1600);
  }

  function dismiss() {
    firing = false;
    clearInterval(beepInterval);
    beepInterval = null;
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('clock').classList.remove('firing');
    resetBtn();
    updateStatus();
  }

  function toggleAlarm() {
    if (firing) { dismiss(); return; }
    alarmOn = !alarmOn;
    alarmTime = document.getElementById('alarm-time').value;

    const btn = document.getElementById('toggle-btn');
    const ring = document.getElementById('ring-alarm');
    if (alarmOn) {
      btn.textContent = 'Cancel';
      btn.classList.add('active');
      ring.classList.add('visible');
    } else {
      resetBtn();
      ring.classList.remove('visible');
    }
    updateStatus();
  }

  function resetBtn() {
    const btn = document.getElementById('toggle-btn');
    btn.textContent = 'Set';
    btn.classList.remove('active');
  }

  function updateStatus() {
    const el = document.getElementById('status');
    const txt = document.getElementById('status-text');
    if (firing) {
      txt.textContent = 'Alarm is ringing!';
      el.className = 'firing';
    } else if (alarmOn) {
      txt.textContent = `Alarm set for ${alarmTime}`;
      el.className = 'on';
    } else {
      txt.textContent = 'No alarm set';
      el.className = '';
    }
  }

  setInterval(tick, 1000);
  tick();
</script>
</body>
</html>
